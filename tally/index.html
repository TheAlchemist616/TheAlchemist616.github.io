<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tally — Twitch live watch</title>
<style>
  :root {
    --bg:        #0c0d11;
    --panel:     #14161d;
    --panel-2:   #191c24;
    --line:      #262a34;
    --ink:       #e9eaf0;
    --muted:     #868b9a;
    --faint:     #5a5f6d;
    --air:       #ff3b47;   /* broadcast red — the live state */
    --air-glow:  rgba(255,59,71,.55);
    --twitch:    #9147ff;   /* the subject's own accent */
    --lamp-off:  #2b2f39;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(1200px 500px at 50% -200px, #16181f 0%, var(--bg) 70%);
    color: var(--ink);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
    padding: 28px 18px 64px;
  }

  .wrap { width: 100%; max-width: 560px; }

  /* ---- Header / master tally ---- */
  .head {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .master {
    width: 46px; height: 46px;
    border-radius: 50%;
    flex: none;
    background: var(--lamp-off);
    border: 1px solid #000;
    box-shadow: inset 0 2px 6px rgba(0,0,0,.6);
    transition: background .35s ease, box-shadow .35s ease;
  }
  .master.on {
    background: var(--air);
    box-shadow: inset 0 1px 4px rgba(0,0,0,.4), 0 0 0 4px rgba(255,59,71,.12), 0 0 22px var(--air-glow);
  }
  .title { flex: 1; min-width: 0; }
  .title h1 {
    margin: 0;
    font-size: 20px;
    letter-spacing: .42em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .title .status {
    margin-top: 4px;
    font-size: 11px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .title .status b { color: var(--air); font-weight: 700; }

  /* ---- Controls ---- */
  .notif { margin: 18px 0 20px; }
  .notif-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  button {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink);
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 14px;
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease;
  }
  button:hover { border-color: var(--twitch); }
  button:focus-visible { outline: 2px solid var(--twitch); outline-offset: 2px; }
  button:disabled { opacity: .45; cursor: default; border-color: var(--line); }
  button.ghost { background: transparent; color: var(--muted); }
  .perm-note { font-size: 11px; color: var(--muted); letter-spacing: .04em; }
  .perm-note.warn { color: #ffb24a; }

  /* ---- Add channel ---- */
  .add { display: flex; gap: 8px; margin-bottom: 10px; }
  .add input {
    flex: 1;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--ink);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 11px 13px;
  }
  .add input::placeholder { color: var(--faint); }
  .add input:focus-visible { outline: 2px solid var(--twitch); outline-offset: 1px; border-color: transparent; }
  .tools { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }

  /* ---- Channel board ---- */
  .board { display: flex; flex-direction: column; gap: 10px; }

  .card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 15px;
    transition: border-color .2s ease, transform .12s ease;
  }
  .card.live { cursor: pointer; border-color: rgba(255,59,71,.35); }
  .card.live:hover { transform: translateY(-1px); border-color: var(--air); }
  .card:focus-visible { outline: 2px solid var(--twitch); outline-offset: 2px; }

  .lamp {
    width: 16px; height: 16px; border-radius: 50%;
    flex: none;
    background: var(--lamp-off);
    box-shadow: inset 0 1px 3px rgba(0,0,0,.7);
  }
  .card.live .lamp {
    background: var(--air);
    box-shadow: 0 0 0 3px rgba(255,59,71,.14), 0 0 12px var(--air-glow);
  }
  .card.error .lamp { background: #6a5330; box-shadow: inset 0 1px 3px rgba(0,0,0,.6); }

  .meta { flex: 1; min-width: 0; }
  .name {
    font-size: 15px;
    letter-spacing: .04em;
    text-transform: lowercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sub {
    margin-top: 3px;
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .card.live .sub b { color: var(--air); font-weight: 700; }
  .card.error .sub { color: #ffb24a; }

  .remove {
    flex: none;
    background: transparent; border: none;
    color: var(--faint);
    font-size: 18px; line-height: 1;
    padding: 6px 8px; margin: -6px -6px -6px 0;
    border-radius: 6px;
    text-transform: none; letter-spacing: 0;
  }
  .remove:hover { color: var(--air); border-color: transparent; }

  .empty {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.7;
    letter-spacing: .05em;
    padding: 30px 20px;
    border: 1px dashed var(--line);
    border-radius: 10px;
  }
  .empty-lead { color: var(--ink); font-size: 13px; margin-bottom: 8px; }

  /* ---- Footer ---- */
  .foot {
    margin-top: 26px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    font-size: 10.5px;
    letter-spacing: .08em;
    line-height: 1.7;
    color: var(--faint);
    text-transform: uppercase;
  }
  .foot a { color: var(--muted); }

  @media (prefers-reduced-motion: no-preference) {
    .master.on, .card.live .lamp { animation: pulse 2.2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { filter: brightness(1); }
      50%      { filter: brightness(1.35); }
    }
  }
</style>
</head>
<body>
  <main class="wrap">
    <header class="head">
      <div id="master" class="master" aria-hidden="true"></div>
      <div class="title">
        <h1>Tally</h1>
        <div id="masterStatus" class="status">no channels yet</div>
      </div>
    </header>

    <section class="notif">
      <div class="notif-row" id="bgRow" style="display:none;">
        <button id="bgBtn" type="button">Enable background alerts</button>
        <span id="bgNote" class="perm-note"></span>
      </div>
    </section>

    <div class="add">
      <input id="chanInput" type="text" autocomplete="off" spellcheck="false"
             placeholder="add a twitch channel…" aria-label="Twitch channel name">
      <button id="addBtn" type="button">Add</button>
    </div>
    <div class="tools">
      <button id="shareBtn" type="button" class="ghost" disabled>Copy shareable link</button>
    </div>

    <section id="board" class="board" aria-live="polite"></section>

    <footer class="foot">
      Turn on alerts to be notified the moment a channel goes live — even with this tab closed.<br>
      Live status via <a href="https://decapi.me" target="_blank" rel="noopener">decapi.me</a>
    </footer>
  </main>

<script>
(() => {
  "use strict";

  // Only real setting left: how often to check. Everyone's channel list is
  // their own, saved on their own device — nothing to hardcode.
  const POLL_SECONDS = 60;
  const STORAGE_KEY = "tally.channels.v1";

  // ---- background (tab-closed) alerts via Web Push -----------------------
  // Fill BOTH in to light up the "Enable background alerts" button. They come
  // from the companion tally-poller running on your always-on box:
  //   PUSH_SERVER      – the poller's public HTTPS URL, no trailing slash
  //                      (e.g. a Tailscale Funnel https://box.tailnet.ts.net)
  //   VAPID_PUBLIC_KEY – printed by `vapid --applicationServerKey`
  const PUSH_SERVER = "https://lunc-validator.tailc84898.ts.net";
  const VAPID_PUBLIC_KEY = "BIg2Z9N7tx-pgQxHvM1xuCoVEaC94VOTrwxMh1BuY8UIgGDfVFlBMZ_LdgMT5uT40r11nsu_O6wsFPWn7httkY8";

  const API = name => `https://decapi.me/twitch/uptime/${encodeURIComponent(name)}`;

  /** name -> { status: 'checking'|'live'|'offline'|'error', detail, checkedAt, wasLive } */
  const state = new Map();

  const el = id => document.getElementById(id);
  const board = el("board");

  // ---- persistence (guarded so it degrades gracefully if storage is blocked)
  function loadSaved() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...state.keys()])); }
    catch { /* private mode / sandbox — list just won't persist */ }
  }

  // ---- sharing via URL (?ch=a,b,c)
  function importFromURL() {
    const ch = new URLSearchParams(location.search).get("ch");
    return ch ? ch.split(",").map(normalize).filter(Boolean) : [];
  }
  function buildShareURL() {
    const base = location.origin + location.pathname;
    const list = [...state.keys()];
    return list.length ? `${base}?ch=${list.map(encodeURIComponent).join(",")}` : base;
  }

  // ---- input normalization: accept "twitch.tv/name", "@name", spaces, case
  function normalize(raw) {
    return raw.trim().toLowerCase()
      .replace(/^@/, "")
      .replace(/^https?:\/\/(www\.)?twitch\.tv\//, "")
      .replace(/[/?#].*$/, "")
      .replace(/\s+/g, "");
  }

  // ---- turn DecAPI's text response into a status
  function classify(text) {
    const t = text.toLowerCase();
    if (t.includes("offline")) return { status: "offline", detail: "" };
    if (/\b(hour|minute|second|day)s?\b/.test(t)) return { status: "live", detail: text.trim() };
    return { status: "error", detail: text.trim() };
  }

  async function pollOne(name) {
    const rec = state.get(name);
    if (!rec) return;
    try {
      const res = await fetch(API(name), { cache: "no-store" });
      const text = await res.text();
      const { status, detail } = classify(text);
      rec.status = status;
      rec.detail = status === "error"
        ? (detail.length > 60 ? "channel not found — check the name" : detail)
        : detail;
      rec.checkedAt = new Date();
    } catch {
      rec.status = "error";
      rec.detail = "couldn't reach the status service";
      rec.checkedAt = new Date();
    }
    render();
  }

  function pollAll() { for (const name of state.keys()) pollOne(name); }

  // ---- channel management
  function addChannel(raw) {
    const name = normalize(raw);
    if (!name || state.has(name)) return;
    state.set(name, { status: "checking", detail: "", checkedAt: null, wasLive: false });
    save();
    render();
    pollOne(name);
  }
  function removeChannel(name) { state.delete(name); save(); render(); syncSubscription(); }

  // ---- rendering
  const SUB = {
    checking: () => "checking…",
    offline:  () => "offline",
    error:    r => r.detail || "error",
    live:     r => `<b>on air</b>${r.detail ? " · " + r.detail : ""}`,
  };
  const fmtTime = d => d ? d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }) : "";

  function render() {
    const liveCount = [...state.values()].filter(r => r.status === "live").length;
    el("master").classList.toggle("on", liveCount > 0);
    el("masterStatus").innerHTML = liveCount > 0
      ? `<b>on air</b> · ${liveCount} live`
      : (state.size ? "all channels dark" : "no channels yet");
    el("shareBtn").disabled = state.size === 0;

    if (state.size === 0) {
      board.innerHTML = `<div class="empty">
        <div class="empty-lead">Add the Twitch channels you want to watch.</div>
        This board lights up when any of them goes live. Turn on alerts to get a
        notification the moment it happens — even when this tab is closed.
      </div>`;
      return;
    }

    board.innerHTML = "";
    for (const [name, r] of state) {
      const card = document.createElement("div");
      card.className = "card " + r.status;
      if (r.status === "live") { card.tabIndex = 0; card.setAttribute("role", "link"); }
      const stamp = r.checkedAt ? ` · ${fmtTime(r.checkedAt)}` : "";
      card.innerHTML = `
        <span class="lamp" aria-hidden="true"></span>
        <div class="meta">
          <div class="name">${name}</div>
          <div class="sub">${SUB[r.status](r)}${r.status !== "checking" ? stamp : ""}</div>
        </div>
        <button class="remove" data-remove="${name}" title="Stop watching" aria-label="Stop watching ${name}">×</button>`;
      board.appendChild(card);
    }
  }

  // ---- events
  board.addEventListener("click", e => {
    const rm = e.target.closest("[data-remove]");
    if (rm) { removeChannel(rm.dataset.remove); return; }
    const card = e.target.closest(".card.live");
    if (card) window.open(`https://twitch.tv/${card.querySelector(".name").textContent}`, "_blank", "noopener");
  });
  board.addEventListener("keydown", e => {
    if ((e.key === "Enter" || e.key === " ") && e.target.classList.contains("live")) {
      e.preventDefault();
      window.open(`https://twitch.tv/${e.target.querySelector(".name").textContent}`, "_blank", "noopener");
    }
  });

  el("addBtn").addEventListener("click", () => { addChannel(el("chanInput").value); el("chanInput").value = ""; el("chanInput").focus(); syncSubscription(); });
  el("chanInput").addEventListener("keydown", e => {
    if (e.key === "Enter") { addChannel(el("chanInput").value); el("chanInput").value = ""; syncSubscription(); }
  });

  el("shareBtn").addEventListener("click", async () => {
    const btn = el("shareBtn"), url = buildShareURL();
    const flash = msg => { btn.textContent = msg; setTimeout(() => { btn.textContent = "Copy shareable link"; }, 1800); };
    try {
      await navigator.clipboard.writeText(url);
      flash("Link copied");
    } catch {
      history.replaceState(null, "", url);   // fallback: drop it in the address bar
      flash("Link is in your address bar");
    }
  });

  // ---- background alerts (Web Push) --------------------------------------
  const pushConfigured = () => Boolean(PUSH_SERVER && VAPID_PUBLIC_KEY);
  const pushSupported  = () =>
    pushConfigured() && "serviceWorker" in navigator && "PushManager" in window && "Notification" in window;

  function urlBase64ToUint8Array(base64) {
    const pad = "=".repeat((4 - (base64.length % 4)) % 4);
    const b64 = (base64 + pad).replace(/-/g, "+").replace(/_/g, "/");
    const raw = atob(b64);
    const out = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
    return out;
  }

  async function currentSubscription() {
    if (!pushSupported()) return null;
    const reg = await navigator.serviceWorker.getRegistration();
    return reg ? reg.pushManager.getSubscription() : null;
  }
  function postJSON(path, body) {
    return fetch(`${PUSH_SERVER}${path}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
  }

  // Keep the poller's watchlist for THIS browser in step with the board.
  async function syncSubscription() {
    const sub = await currentSubscription();
    if (!sub) return;
    try { await postJSON("/subscribe", { subscription: sub, channels: [...state.keys()] }); }
    catch { /* box unreachable right now — next change will resync */ }
  }

  async function enablePush() {
    const note = el("bgNote");
    if (!pushSupported()) return;
    try {
      if (await Notification.requestPermission() !== "granted") {
        note.textContent = "allow notifications in your browser to get alerts";
        note.className = "perm-note warn";
        return;
      }
      const reg = await navigator.serviceWorker.register("sw.js");
      await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
      const res = await postJSON("/subscribe", { subscription: sub, channels: [...state.keys()] });
      if (!res.ok) throw new Error("server " + res.status);
    } catch (e) {
      note.textContent = "couldn't enable — " + (e.message || "check the poller URL");
      note.className = "perm-note warn";
    }
    updatePushUI();
  }

  async function disablePush() {
    const sub = await currentSubscription();
    if (sub) {
      try { await postJSON("/unsubscribe", { endpoint: sub.endpoint }); } catch {}
      try { await sub.unsubscribe(); } catch {}
    }
    updatePushUI();
  }

  async function updatePushUI() {
    const row = el("bgRow"), btn = el("bgBtn"), note = el("bgNote");
    if (!pushConfigured()) { row.style.display = "none"; return; }
    row.style.display = "";
    if (!pushSupported()) {
      btn.disabled = true;
      note.textContent = "this browser can't show background notifications";
      note.className = "perm-note warn";
      return;
    }
    const sub = await currentSubscription();
    if (sub) {
      btn.textContent = "Background alerts on"; btn.classList.add("ghost");
      note.textContent = "you're alerted even with this tab closed · click to turn off";
      note.className = "perm-note";
      btn.onclick = disablePush;
    } else {
      btn.textContent = "Enable background alerts"; btn.classList.remove("ghost");
      note.textContent = "get notified when a channel goes live, even with this tab closed";
      note.className = "perm-note";
      btn.onclick = enablePush;
    }
  }

  // ---- boot: merge this device's saved list with any list from a shared URL
  updatePushUI();
  [...new Set([...loadSaved(), ...importFromURL()])].forEach(addChannel);
  if (location.search) history.replaceState(null, "", location.origin + location.pathname);
  render();
  syncSubscription();
  setInterval(pollAll, POLL_SECONDS * 1000);
})();
</script>
</body>
</html>
